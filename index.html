<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="variables.css">
        <link rel="stylesheet" href="style.css" />
        <title>Results summary</title>
    </head>
    <body>
        <main class="container">
            <section class="result">
                <h2>Your Result</h2>
                <div class="circle">
                    <span>76</span>
                    <p>of 100</p>
                </div>
                <h3>Great</h3>
                <p>
                    You scored higher than 65% of the people who have taken
                    these tests.
                </p>
            </section>
            <section class="summary">
                <h2>Summary</h2>
                <ul>
                    <li class="reaction">
                        <div class="item">
                            <img
                                src="./images/icon-reaction.svg"
                                alt="reaction"
                            />Reaction
                        </div>
                        <p><span>80</span> / 100</p>
                    </li>
                    <li class="memory">
                        <div class="item">
                            <img
                                src="./images/icon-memory.svg"
                                alt="memory"
                            />Memory
                        </div>
                        <p><span>92</span> / 100</p>
                    </li>
                    <li class="verbal">
                        <div class="item">
                            <img
                                src="./images/icon-verbal.svg"
                                alt="verbal"
                            />Verbal
                        </div>
                        <p><span>61</span> / 100</p>
                    </li>
                    <li class="visual">
                        <div class="item">
                            <img
                                src="./images/icon-visual.svg"
                                alt="visual"
                            />Visual
                        </div>
                        <p><span>73</span> / 100</p>
                    </li>
                </ul>
                <button class="btn-continue">Continue</button>
                
            </section>
        </main>
    </body>
</html>
